<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript ตัวอย่างที่ 1</title>
</head>
<body>
    
    <h1>ตัวอย่างแบบฝังใน html</h1>
    <button onclick="showMessage()">กดเพื่อแสดงข้อความ</button>

    <script>
        function showMessage() {
            alert("สวัสดี!")
        }
        
        console.log("โค้ดใน Script กำลังทำงาน")
    </script>
</body>
</html>
