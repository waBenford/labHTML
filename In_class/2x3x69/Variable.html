<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="runDemo()">Run code</button>
    <script>
        function runDemo() {
            //cls console
            console.clear();
            const output = [];

            //ตัวอย่างตัวแปร
            let studentName = 'สมชาย';
            let age = 20;
            let isStudent = true;
            const universityName = 'มหาลัยวัวชน'

            //แสดงค่าตัวแปรเริ่มต้น
            output.push("ชื่อ: " + studentName);
            console.log("ชื่อ:", studentName);
            output.push("อายุ: " + age);
            console.log("อายุ:", age);

            //เปลี่ยนค่า let
            age = 21;
            output.push("อายุใหม่: " + age);
            console.log("อายุใหม่:" , age);

            //เปลี่ยนค่า console
            try {
                universityName = "มหาลัยใหม่";
            } catch (e) {
                output.push("Error: " + e.message);
                console.error(e.message);
            }

            //แสดงผลบนหน้าจอ
            document.getElementById("outputBox").textContent = output.join("\n");
        }
    </script>
</body>
</html>
