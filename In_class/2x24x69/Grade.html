<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>ฟังก์ชันคำนวณเกรด<br>(Calculate Grade)</h2>
        <p><b>กรอกคะแนน:</b></p>
        
        <div class="input-group">
            <input type="number" id="scoreInput" placeholder="0 - 100">
            <button onclick="runGrade()">คำนวณเกรด</button>
        </div>

        <div id="outputBox">ผลลัพธ์จะปรากฏที่นี่...</div>
    </div>

    <script>
        function calculateGrade(score) {
            if (score >= 80) {
                return "A";
            } else if (score >= 70) {
                return "B";
            } else if (score >= 60) {
                return "C";
            } else if (score >= 50) {
                return "D";
            } else {
                return "F";
            }
        }

        function runGrade() {
            const output = [];
            let score = Number(document.getElementById("scoreInput").value);

            // ตรวจสอบความถูกต้องของข้อมูล
            if (isNaN(score) || score < 0 || score > 100) {
                output.push("⚠️ กรุณากรอกคะแนน 0-100");
                document.getElementById("outputBox").textContent = output.join("\n");
                return;
            }

            let grade = calculateGrade(score);

            output.push("คะแนน: " + score);
            output.push("เกรดที่ได้: " + grade);

            // แสดงผลใน Console ของ Browser
            console.log("คะแนน:", score);
            console.log("เกรด:", grade);

            // แสดงผลที่หน้าเว็บ
            document.getElementById("outputBox").textContent = output.join("\n");
        }
    </script>
</body>
</html>
