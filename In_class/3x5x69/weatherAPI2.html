<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="loadUsersPromise()">โหลดแบบ Promise</button>
<button onclick="loadUsersAsync()">โหลดแบบ Async/Await</button>
<ul id="userList"></ul>

<script>
// API สำหรับทดลอง
const API_URL = "https://jsonplaceholder.typicode.com/users";

// 1. แบบ Promise (.then)
function loadUsersPromise(){
    const list = document.getElementById("userList");
    // เรียก API
    fetch(API_URL) // fetch ส่ง request ไปยัง API และคืนค่าเป็น Promise

    // แปลง JSON เป็น Object
    .then(res => res.json()) // .then ตัวที่ 1 จะทำงานเมื่อ Promise สำเร็จ
    // แสดงข้อมูลบนหน้าเว็บ
    .then(users => {   // .then ตัวที่ 2 จะทำงานเมื่อ JSON แปลงเสร็จ
        list.innerHTML = "";
        users.forEach(user => {
            const li = document.createElement("li");
            li.textContent = user.name;
            list.appendChild(li);
        });
    });
}

// 2. แบบ async / await
async function loadUsersAsync(){
    const list = document.getElementById("userList");
    // เรียก API
    const res = await fetch(API_URL);
    // แปลง JSON เป็น Object
    const users = await res.json(); // await รอผลลัพธ์จาก Promise แบบ non-blocking
    
    list.innerHTML = "";
    users.forEach(user => {
        const li = document.createElement("li");
        li.textContent = user.name;
        list.appendChild(li);
    });
}
</script>
</body>
</html>
