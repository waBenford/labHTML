<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>preventDefault() & stopPropagation() Demo</title>
<style>
    body { font-family: Tahoma; padding: 20px; background: #f4f4f4; }

    h2 { color: #0b63c5; }
    .box {
        background: #fff;
        padding: 20px;
        margin-bottom: 40px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #parent {
        padding: 20px;
        background: #cfe2ff;
        border-radius: 8px;
        display: inline-block;
    }

    #child {
        margin-left: 20px;
        padding: 8px 16px;
        background: #1561f8;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #888;
    }

    .form-input {
        padding: 8px;
        width: 250px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        padding: 8px 16px;
        border-radius: 6px;
        border: none;
        background: #0b63c5;
        color: #fff;
        cursor: pointer;
        margin-left: 10px;
    }
</style>
</head>
<body>

<h2>1) ตัวอย่าง preventDefault() — หยุดการส่งฟอร์ม</h2>
<div class="box">
    <form id="myForm">
        <input class="form-input" type="text" placeholder="ลองพิมพ์แล้วกด Enter">
        <button type="submit">ส่ง</button>
    </form>
    <p id="result" style="color:green; font-weight:bold;"></p>
</div>


<h2>2) ตัวอย่าง stopPropagation() — หยุด Event Bubbling</h2>
<div class="box">
    <div id="parent">
        Parent Element
        <button id="child">Child Button</button>
    </div>
    <p>(ดูผลลัพธ์ใน Console)</p>
</div>


<script>
// ==========================
// preventDefault()
// ==========================
const form = document.getElementById("myForm");
const result = document.getElementById("result");

form.addEventListener("submit", function(event) {
    event.preventDefault();  // ❌ หยุดไม่ให้ฟอร์ม reload
    result.textContent = "ฟอร์มถูกหยุดแล้ว!";
});


// ==========================
// stopPropagation()
// ==========================
const parent = document.getElementById("parent");
const child = document.getElementById("child");

parent.addEventListener("click", function() {
    console.log("Parent ถูกคลิก");
});

child.addEventListener("click", function(event) {
    event.stopPropagation();  // ❌ ไม่ให้ event วิ่งขึ้นไป Parent
    console.log("เฉพาะ Child ถูกคลิก");
});
</script>

</body>
</html>
